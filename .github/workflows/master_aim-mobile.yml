name: Build and deploy Node.js app to Azure Web App - aim-mobile

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with webpack (not Turbopack)
        run: node scripts/build.js

      - name: Verify production build output
        run: |
          test -f .next/BUILD_ID
          echo "BUILD_ID=$(cat .next/BUILD_ID)"
          du -sh .next node_modules

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          include-hidden-files: true
          if-no-files-found: error
          path: |
            .next
            node_modules
            public
            src
            scripts
            data
            package.json
            package-lock.json
            next.config.ts
            postcss.config.mjs
            tsconfig.json
            startup.sh
            .npmrc
            .deployment

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Verify artifact before deploy
        run: |
          test -f .next/BUILD_ID
          echo "Deploying build $(cat .next/BUILD_ID)"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D189692926514FEB851AEFC5396F8922 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6A1D26840D0A4DD59A557F13DC393896 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4D9BCC8F27504CF89CA8249152BEB182 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: aim-mobile
          slot-name: Production
          package: .
